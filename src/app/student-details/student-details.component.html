<h2>Student Details</h2>

<div *ngIf="student"> <!--ngIF display data only condition is achieved-->
  <p>ID: {{student.id}}</p>
  <p>Name: {{student.firstName}} {{student.lastName}}</p>
  <p>Age: {{student.age}}</p>
  <p>Email: {{student.email}}</p>
  <p>Department: {{student.department}}</p>
  <p>GPA: {{student.GPA}}</p>
</div>
